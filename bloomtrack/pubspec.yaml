name: bloomtrack
description: "BloomTrack — Period & Fertility Tracking App. Local-only, encrypted, private."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.2

  # Database (local, encrypted)
  drift: ^2.34.0
  drift_flutter: ^0.3.0

  # Encryption key storage (OS keychain)
  flutter_secure_storage: ^10.2.0

  # Path provider
  path_provider: ^2.1.6

  # Calendar widget
  table_calendar: ^3.2.0

  # Charts
  fl_chart: ^1.2.0

  # Local notifications (reminders)
  flutter_local_notifications: ^22.0.1

  # Routing
  go_router: ^17.2.3

  # Biometric / PIN lock
  local_auth: ^3.0.1
  
  # SharedPreferences
  shared_preferences: ^2.2.2

  # Date formatting & i18n
  intl: ^0.20.3

  # Sharing / export
  share_plus: ^13.2.0

  # CSV export
  csv: ^8.0.0

  # PDF generation
  pdf: ^3.13.0
  printing: ^5.15.0
  timezone: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.20.3
  build_runner: ^2.6.0

flutter:
  uses-material-design: true
